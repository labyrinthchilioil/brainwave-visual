<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream of Consciousness: Brainwave Behavioral Matrixn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

        body {
            background-color: #f5f5f7;
            overflow: hidden;
            font-family: 'Space Mono', monospace;
            color: #1a1a1a;
            margin: 0;
            padding: 0;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        .bottom-dock {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            z-index: 100;
            width: 96vw;
            max-width: 1250px;
            display: flex;
            padding: 1.5rem;
            gap: 2rem;
            align-items: center;
        }
        .monitor-container {
            flex: 1.5;
            height: 160px;
            position: relative;
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 1rem;
            overflow: hidden;
        }
        #spectralCanvas {
            width: 100%;
            height: 100%;
        }
        input[type="range"] {
            accent-color: #000;
        }
        .band-legend {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }
        .btn-action {
            transition: all 0.2s ease;
        }
        .recording-glow {
            animation: record-pulse 1.5s infinite;
            background-color: #ef4444 !important;
        }
        @keyframes record-pulse {
            0% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="flex flex-col h-screen">


    <!-- Primary Art Canvas -->
    <canvas id="mainCanvas"></canvas>


    <div class="bottom-dock">
        <!-- Control Group -->
        <div class="flex flex-col gap-3 min-w-[240px]">
            <div>
                <h1 class="text-[11px] font-bold tracking-[0.2em] uppercase text-black">
                    Brainwave Behavioral Matrix
                </h1>
                <p class="text-[8px] text-gray-400 tracking-widest uppercase">
                    Higher Activity -> Larger Pixels
                </p>
            </div>

            <div class="flex flex-col gap-2">
                <div class="flex justify-between text-[9px] font-bold text-gray-500 uppercase">
                    <span>Grid Base: <span id="pixelSizeDisp" class="text-black">20</span></span>
                    <span>Gain: <span id="gainDisp" class="text-black">4.0</span></span>
                </div>
                <input type="range" id="pixelSize" min="4" max="48" step="4" value="20" class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                <input type="range" id="dataGain" min="0.1" max="15" step="0.5" value="4.0" class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer">

                <div class="flex justify-between text-[9px] font-bold text-gray-500 uppercase mt-1">
                    <span>Speed Skip: <span id="speedDisp" class="text-black">100</span></span>
                </div>
                <input type="range" id="playSpeed" min="1" max="500" step="1" value="100" class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer">
            </div>
        </div>


        <!-- Spectral Feed (Transparent) -->
        <div class="monitor-container">
            <canvas id="spectralCanvas"></canvas>
            <div class="absolute top-2 left-2 text-[7px] font-bold text-gray-400 uppercase tracking-widest pointer-events-none">
                EEG SPECTRAL ACTIVITY DISPLAY
            </div>
        </div>


        <!-- Recording & Band Info -->
        <div class="flex flex-col gap-3 min-w-[220px]">
            <button id="recordBtn" class="btn-action w-full py-3 bg-black text-white text-[10px] uppercase font-bold rounded-xl hover:opacity-80">
                Start Recording
            </button>

            <div class="flex gap-2">
                <label class="flex-1 text-center py-2 rounded-xl cursor-pointer transition bg-gray-100 hover:bg-gray-200 border border-gray-200">
                    <span id="uploadStatus" class="text-[9px] font-bold text-gray-600 uppercase">Import CSV</span>
                    <input type="file" id="csvFile" accept=".csv" class="hidden">
                </label>
                <button id="clearBtn" class="flex-1 py-2 bg-gray-100 text-gray-600 text-[9px] uppercase font-bold rounded-xl border border-gray-200">Reset</button>
            </div>


            <div class="band-legend">
                <div class="legend-item"><div class="dot bg-[#4B0082]"></div>Delta</div>
                <div class="legend-item"><div class="dot bg-[#00CED1]"></div>Theta</div>
                <div class="legend-item"><div class="dot bg-[#32CD32]"></div>Alpha</div>
                <div class="legend-item"><div class="dot bg-[#FFD700]"></div>Beta</div>
                <div class="legend-item"><div class="dot bg-[#FF4500]"></div>Gamma</div>
            </div>
        </div>
    </div>


    <script>
        /* ==========================================================
        STREAM OF CONSCIOUSNESS
        Brainwave Behavioral Matrix Engine
        ----------------------------------------------------------
        SYSTEM OVERVIEW

        This system transforms EEG spectral band activity
        (Delta, Theta, Alpha, Beta, Gamma) into a spatial,
        procedural, pixel-based behavioral composition.

        Pipeline Architecture:

        1. CSV Data Ingestion
        2. Temporal Frame Sampling + Speed Skipping
        3. Lerp-Based Signal Smoothing
        4. Spectral History Buffer Rendering
        5. Spatial Behavioral Mark-Making Engine
        6. Canvas Capture + WebM Recording

        Design Principle:
        Neural intensity modulates spatial density and pixel scale.
        Higher global activity → larger dynamic grid structures.
        ========================================================== */


        /* ==========================================================
        DOM REFERENCES
        ---------------------------------------------------------- */

        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        const spectralCanvas = document.getElementById('spectralCanvas');
        const sCtx = spectralCanvas.getContext('2d');

        const pixelSizeInput = document.getElementById('pixelSize');
        const gainInput = document.getElementById('dataGain');
        const speedInput = document.getElementById('playSpeed');
        const csvFileInput = document.getElementById('csvFile');
        const recordBtn = document.getElementById('recordBtn');
        const uploadStatus = document.getElementById('uploadStatus');
        const clearBtn = document.getElementById('clearBtn');


        /* ==========================================================
        STATE VARIABLES
        ---------------------------------------------------------- */

        // Raw EEG frames loaded from CSV
        let rawBrainData = [];

        // Smoothed signal state (temporal interpolation target)
        let smoothedData = {
            Delta: 0,
            Theta: 0,
            Alpha: 0,
            Beta: 0,
            Gamma: 0
        };

        // Rolling spectral monitor history buffer
        let history = [];

        let dataPointer = 0;
        let lastTimestamp = 0;

        // Max spectral history length
        const maxHistory = 150;

        // Linear interpolation factor (signal smoothing strength)
        const lerpFactor = 0.12;

        // Dynamically modulated pixel grid size
        let currentDynamicPSize = 20;


        /* ==========================================================
        RECORDING SUBSYSTEM
        ----------------------------------------------------------
        Captures canvas stream (30fps)
        Encodes using VP9
        Exports downloadable WebM file
        ========================================================== */

        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;


        /* ==========================================================
        EEG BAND SPATIAL CONFIGURATION
        ----------------------------------------------------------
        Each band is anchored to a fixed normalized position.
        type defines procedural behavior logic.
        ========================================================== */

        const bandConfigs = [
            { id: 'Delta', color: '#4B0082', type: 'cloud',   x: 0.15, y: 0.2 },
            { id: 'Theta', color: '#00CED1', type: 'ink',     x: 0.85, y: 0.2 },
            { id: 'Alpha', color: '#32CD32', type: 'grid',    x: 0.5,  y: 0.5 },
            { id: 'Beta',  color: '#FFD700', type: 'scratch', x: 0.15, y: 0.8 },
            { id: 'Gamma', color: '#FF4500', type: 'flash',   x: 0.85, y: 0.8 }
        ];


        /* ==========================================================
        CANVAS INITIALIZATION
        ---------------------------------------------------------- */

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            spectralCanvas.width = spectralCanvas.offsetWidth;
            spectralCanvas.height = spectralCanvas.offsetHeight;

            ctx.fillStyle = '#f5f5f7';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }


        /* ==========================================================
        CSV IMPORT HANDLER
        ----------------------------------------------------------
        Reads and parses CSV file
        Populates rawBrainData with EEG frame data
        ========================================================== */

        csvFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const csv = event.target.result;
                    const lines = csv.split('\n');
                    const header = lines[0].split(',').map(h => h.trim());
                    
                    rawBrainData = [];
                    for (let i = 1; i < lines.length; i++) {
                        if (!lines[i].trim()) continue;
                        
                        const values = lines[i].split(',').map(v => parseFloat(v.trim()));
                        const row = {};
                        header.forEach((col, idx) => {
                            row[col] = values[idx] || 0;
                        });
                        rawBrainData.push(row);
                    }
                    
                    dataPointer = 0;
                    lastTimestamp = 0;
                    uploadStatus.innerText = `Loaded ${rawBrainData.length} frames`;
                    console.log('CSV loaded successfully:', rawBrainData.length, 'frames');
                } catch (error) {
                    uploadStatus.innerText = 'Import failed';
                    console.error('CSV parsing error:', error);
                }
            };
            reader.readAsText(file);
        });


        /* ==========================================================
        CLEAR/RESET HANDLER
        ----------------------------------------------------------
        Resets all data and clears canvas
        ========================================================== */

        clearBtn.addEventListener('click', () => {
            rawBrainData = [];
            dataPointer = 0;
            lastTimestamp = 0;
            smoothedData = {
                Delta: 0,
                Theta: 0,
                Alpha: 0,
                Beta: 0,
                Gamma: 0
            };
            history = [];
            csvFileInput.value = '';
            uploadStatus.innerText = 'Import CSV';
            
            ctx.fillStyle = '#f5f5f7';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });


        /* ==========================================================
        NONLINEAR SIGNAL AMPLIFICATION
        ----------------------------------------------------------
        Applies gain and perceptual contrast shaping.
        Enhances small EEG differences for visual clarity.
        ========================================================== */

        function getHighContrastValue(rawVal, gain) {
            if (rawVal <= 0) return 0;

            return Math.pow(rawVal * gain * 2.0, 1.05) * 10;
        }


        /* ==========================================================
        SPECTRAL MONITOR RENDERER
        ----------------------------------------------------------
        Maintains rolling amplitude curves for each band.
        ========================================================== */

        function updateSpectralMonitor() {

            history.push({ ...smoothedData });
            if (history.length > maxHistory) history.shift();

            sCtx.clearRect(0, 0, spectralCanvas.width, spectralCanvas.height);

            const step = spectralCanvas.width / (maxHistory - 1);
            const baselineY = spectralCanvas.height - 20;
            const gain = parseFloat(gainInput.value);

            bandConfigs.forEach(config => {

                sCtx.beginPath();
                sCtx.strokeStyle = config.color;
                sCtx.lineWidth = 2.0;

                history.forEach((point, i) => {

                    const amp = getHighContrastValue(point[config.id] || 0, gain);
                    const x = i * step;
                    const y = baselineY - amp;

                    if (i === 0) sCtx.moveTo(x, y);
                    else sCtx.lineTo(x, y);
                });

                sCtx.stroke();
            });

            // Draw baseline reference
            sCtx.strokeStyle = 'rgba(0,0,0,0.05)';
            sCtx.beginPath();
            sCtx.moveTo(0, baselineY);
            sCtx.lineTo(spectralCanvas.width, baselineY);
            sCtx.stroke();
        }


        /* ==========================================================
        BEHAVIORAL RENDERING ENGINE
        ----------------------------------------------------------
        Translates EEG amplitudes into spatial mark systems.
        Global intensity controls dynamic pixel scaling.
        ========================================================== */

        function drawBehavioral() {

            const basePSize = parseInt(pixelSizeInput.value);
            const gain = parseFloat(gainInput.value);

            let totalActivity = 0;
            bandConfigs.forEach(c => {
                totalActivity += (smoothedData[c.id] || 0);
            });

            // Dynamic pixel scaling logic
            let intensityFactor = 0.5 + (totalActivity * gain * 0.15);
            intensityFactor = Math.max(0.15, Math.min(6.0, intensityFactor));

            let targetPSize = basePSize * intensityFactor;

            currentDynamicPSize +=
                (targetPSize - currentDynamicPSize) * 0.15;

            const pSize = Math.max(1, Math.round(currentDynamicPSize));

            document.getElementById('pixelSizeDisp').innerText = basePSize + "px";
            document.getElementById('gainDisp').innerText = gain.toFixed(1);
            document.getElementById('speedDisp').innerText = speedInput.value;

            updateSpectralMonitor();

            bandConfigs.forEach(config => {

                let val = (smoothedData[config.id] || 0) * gain;
                if (val <= 0.01) return;

                const cx = config.x * canvas.width;
                const cy = config.y * canvas.height;

                // Controlled radial dispersion
                const spreadScale = val * 550;

                const px = Math.floor(
                    (cx + (Math.random() - 0.5) * spreadScale) / pSize
                ) * pSize;

                const py = Math.floor(
                    (cy + (Math.random() - 0.5) * spreadScale) / pSize
                ) * pSize;

                ctx.fillStyle = config.color;

                switch(config.type) {

                    case 'cloud':
                        ctx.globalAlpha = 0.04;
                        ctx.fillRect(px - (val*80), py - (val*80),
                                    val*160, val*160);
                        break;

                    case 'ink':
                        ctx.globalAlpha = 0.1;
                        ctx.beginPath();
                        ctx.arc(px, py, val*40, 0, Math.PI*2);
                        ctx.fill();
                        break;

                    case 'grid':
                        ctx.globalAlpha = 0.22;
                        ctx.fillRect(px - (val*120), py,
                                    val*240, pSize);
                        break;

                    case 'scratch':
                        ctx.globalAlpha = 0.3;
                        ctx.fillRect(px, py - (val*100),
                                    pSize/2, val*200);
                        break;

                    case 'flash':
                        ctx.globalAlpha = 0.6;
                        ctx.fillRect(px, py,
                                    Math.max(1, pSize/2),
                                    Math.max(1, pSize/2));
                        break;
                }
            });
        }


        /* ==========================================================
        MAIN ANIMATION LOOP
        ----------------------------------------------------------
        Handles:
        - Frame stepping
        - Temporal interpolation
        - Speed skipping
        ========================================================== */

        function animate(timestamp) {

            if (rawBrainData.length > 0) {

                if (timestamp - lastTimestamp > 30) {

                    const targetFrame =
                        rawBrainData[dataPointer];

                    bandConfigs.forEach(config => {

                        const targetVal =
                            targetFrame[config.id] || 0;

                        smoothedData[config.id] +=
                            (targetVal -
                            smoothedData[config.id]) *
                            lerpFactor;
                    });

                    drawBehavioral();

                    const skip = parseInt(speedInput.value);

                    dataPointer =
                        (dataPointer + skip) %
                        rawBrainData.length;

                    lastTimestamp = timestamp;
                }
            }
            else {
                updateSpectralMonitor();
            }

            requestAnimationFrame(animate);
        }

        // Initialize canvas and start animation loop
        initCanvas();
        requestAnimationFrame(animate);

        // Handle window resize
        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
