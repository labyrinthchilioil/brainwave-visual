<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream of Consciousness: Brainwave Behavioral Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

        body {
            background-color: #f5f5f7;
            overflow: hidden;
            font-family: 'Space Mono', monospace;
            color: #1a1a1a;
            margin: 0;
            padding: 0;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        /* Dashboard Styling */
        .bottom-dock {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 2rem;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
            z-index: 100;
            width: 92vw;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 200px 1fr 280px;
            padding: 1.25rem 1.75rem;
            gap: 1.5rem;
            align-items: center;
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .bottom-dock.hidden-panel {
            transform: translate(-50%, 160%);
            opacity: 0;
            pointer-events: none;
        }
        /* UI Toggle Button */
        .toggle-ui-btn {
            position: fixed;
            bottom: 1.5rem;
            right: 2rem;
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 110;
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 0;
        }
        .toggle-ui-btn:hover {
            background: #fff;
            transform: scale(1.1);
        }
        /* Spectral Monitor Background */
        .monitor-container {
            height: 100px;
            position: relative;
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.02);
            border-radius: 1rem;
            overflow: hidden;
        }
        #spectralCanvas {
            width: 100%;
            height: 100%;
        }
        input[type="range"] {
            accent-color: #000;
            height: 3px;
        }
        .band-legend {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px 8px;
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #666;
            white-space: nowrap;
        }
        .dot {
            width: 7px;
            height: 7px;
            border-radius: 2px;
        }
        /* Recording Animation */
        .recording-glow {
            animation: record-pulse 1.5s infinite;
            background-color: #f43f5e !important;
        }
        @keyframes record-pulse {
            0% { box-shadow: 0 0 0 0px rgba(244, 63, 94, 0.6); }
            70% { box-shadow: 0 0 0 12px rgba(244, 63, 94, 0); }
            100% { box-shadow: 0 0 0 0px rgba(244, 63, 94, 0); }
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <canvas id="mainCanvas"></canvas>

    <!-- UI Visibility Toggle -->
    <div id="toggleUI" class="toggle-ui-btn" title="Toggle UI Panel">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
    </div>

    <div class="bottom-dock" id="bottomDock">
        <!-- Dashboard Left: Branding & Core Settings -->
        <div class="flex flex-col gap-2">
            <div>
                <h1 class="text-[10px] font-bold tracking-[0.1em] uppercase text-black">Brainwave Behavioral Matrix v1.2</h1>
                <p class="text-[8px] text-gray-400 font-bold tracking-[0.2em] uppercase">EEG Status Mapping System by ZOE</p>
            </div>

            <div class="flex flex-col gap-1.5">
                <div class="space-y-0.5">
                    <div class="flex justify-between text-[7px] font-bold text-gray-400 uppercase">
                        <span>Grid <span id="pixelSizeDisp" class="text-black">24px</span></span>
                        <span>Sensitivity <span id="gainDisp" class="text-black">5.0</span></span>
                    </div>
                    <input type="range" id="pixelSize" min="4" max="80" step="4" value="24" class="w-full appearance-none bg-gray-200 rounded-full cursor-pointer">
                    <input type="range" id="dataGain" min="1" max="20" step="0.5" value="5.0" class="w-full appearance-none bg-gray-200 rounded-full cursor-pointer">
                </div>
                <div class="space-y-0.5">
                    <div class="flex justify-between text-[7px] font-bold text-gray-400 uppercase">
                        <span>Speed <span id="speedDisp" class="text-black">100</span></span>
                    </div>
                    <input type="range" id="playSpeed" min="1" max="500" step="1" value="100" class="w-full appearance-none bg-gray-200 rounded-full cursor-pointer">
                </div>
            </div>
        </div>

        <!-- Dashboard Middle: Spectral Monitor -->
        <div class="monitor-container">
            <canvas id="spectralCanvas"></canvas>
            <div class="absolute top-1.5 left-2.5 text-[7px] font-bold text-gray-400 uppercase tracking-widest pointer-events-none">
                Spectral Feed
            </div>
        </div>

        <!-- Dashboard Right: Controls & Legend -->
        <div class="flex flex-col gap-3">
            <div class="flex flex-col gap-1.5">
                <button id="recordBtn" class="btn-main w-full py-1.5 bg-black text-white text-[9px] uppercase font-bold rounded-lg hover:bg-gray-800 transition-all">
                    Start Recording
                </button>
                <div class="grid grid-cols-2 gap-1.5">
                    <label class="text-center py-1 rounded-lg cursor-pointer transition bg-white border border-gray-100 hover:border-gray-200">
                        <span id="uploadStatus" class="text-[8px] font-bold text-gray-600 uppercase">Import CSV</span>
                        <input type="file" id="csvFile" accept=".csv" class="hidden">
                    </label>
                    <button id="clearBtn" class="py-1 bg-white text-gray-600 text-[8px] uppercase font-bold rounded-lg border border-gray-100 hover:border-gray-200">Reset Canvas</button>
                </div>
            </div>

            <div class="band-legend p-2 bg-gray-100/40 rounded-xl border border-white/50">
                <div class="legend-item"><div class="dot bg-[#4B0082]"></div>δ Delta</div>
                <div class="legend-item"><div class="dot bg-[#00CED1]"></div>θ Theta</div>
                <div class="legend-item"><div class="dot bg-[#32CD32]"></div>α Alpha</div>
                <div class="legend-item"><div class="dot bg-[#FFD700]"></div>β Beta</div>
                <div class="legend-item"><div class="dot bg-[#FF4500]"></div>γ Gamma</div>
            </div>
        </div>
    </div>

    <script>
        /* =========================
        1. Data Store Layer
        ========================= */

        class BrainDataStore {
            constructor() {
                this.raw = [];
                this.index = 0;
                this.smoothed = { Delta:0, Theta:0, Alpha:0, Beta:0, Gamma:0 };
                this.lerpFactor = 0.12;
                this.isSimulating = false;
            }

            load(data){
                this.raw = data;
                this.index = 0;
                this.isSimulating = false;
            }

            reset() {
                this.raw = [];
                this.index = 0;
                this.isSimulating = false;
                Object.keys(this.smoothed).forEach(k => this.smoothed[k] = 0);
            }

            update(speed){
                if (this.isSimulating) {
                    const t = Date.now() * 0.001;
                    const bands = ['Delta', 'Theta', 'Alpha', 'Beta', 'Gamma'];
                    bands.forEach((k, i) => {
                        const target = (Math.sin(t * (i + 1) * 0.5) + Math.sin(t * (i + 1) * 1.3) + 2) * 0.25;
                        this.smoothed[k] += (target - this.smoothed[k]) * this.lerpFactor;
                    });
                    return true;
                }

                if(this.raw.length === 0) return false;

                const frame = this.raw[Math.floor(this.index) % this.raw.length];
                Object.keys(this.smoothed).forEach(k=>{
                    const target = frame[k] || 0;
                    this.smoothed[k] += (target - this.smoothed[k]) * this.lerpFactor;
                });

                this.index += speed * 0.1; 
                return true;
            }
        }

        /* =========================
        2. Main Visual Renderer
        ========================= */

        class MainRenderer {
            constructor(canvas, store){
                this.canvas = canvas;
                this.ctx = canvas.getContext("2d", { alpha: false });
                this.store = store;
                this.pixelSize = 24;
                this.gain = 5;

                // Core layout: four corners and center
                this.bandConfigs = [
                    { id:'Delta', color:'#4B0082', type:'cloud',   x:0.15, y:0.15 }, // Compact top left
                    { id:'Theta', color:'#00CED1', type:'ink',     x:0.85, y:0.15 }, // Compact top right
                    { id:'Alpha', color:'#32CD32', type:'grid',    x:0.50, y:0.50 }, // center
                    { id:'Beta',  color:'#FFD700', type:'scratch', x:0.15, y:0.85 }, // Compact bottom left
                    { id:'Gamma', color:'#FF4500', type:'flash',   x:0.85, y:0.85 }  // Compact bottom right
                ];

                this.resize();
                window.addEventListener("resize", ()=>this.resize());
            }

            resize(){
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.clear();
            }

            clear(){
                this.ctx.fillStyle = "#f5f5f7";
                this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height);
            }

            setConfig({pixelSize, gain}){
                if(pixelSize !== undefined) this.pixelSize = pixelSize;
                if(gain !== undefined) this.gain = gain;
            }

            // Normal distribution generates a shift, making particles more focused on the center point.
            gaussianRandom() {
                let u = 0, v = 0;
                while(u === 0) u = Math.random();
                while(v === 0) v = Math.random();
                return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
            }

            render(){
                const ctx = this.ctx;
                const pSize = this.pixelSize;
                const gain = this.gain;

                this.bandConfigs.forEach(config=>{
                    let val = (this.store.smoothed[config.id] || 0) * gain;
                    if(val < 0.05) return;

                    const cx = config.x * this.canvas.width;
                    const cy = config.y * this.canvas.height;

                    // Draw multiple points in each frame to represent the degree of clustering
                    const density = Math.floor(val * 5); 
                    for(let i=0; i<density; i++){
                        // Use a Gaussian random distribution to cluster the points at the anchor point.
                        const spreadBase = Math.min(this.canvas.width, this.canvas.height) * 0.15;
                        const offsetX = this.gaussianRandom() * spreadBase * (val * 0.5);
                        const offsetY = this.gaussianRandom() * spreadBase * (val * 0.5);

                        const px = Math.floor((cx + offsetX)/pSize)*pSize;
                        const py = Math.floor((cy + offsetY)/pSize)*pSize;

                        ctx.fillStyle = config.color;

                        switch(config.type){
                            case 'cloud':
                                ctx.globalAlpha = 0.12;
                                const size = Math.floor((val*140)/pSize)*pSize;
                                ctx.fillRect(px-size/2, py-size/2, size, size);
                                break;

                            case 'ink':
                                ctx.globalAlpha = 0.2;
                                const r = Math.floor((val*40)/pSize)*pSize; 
                                ctx.beginPath();
                                ctx.arc(px, py, r, 0, Math.PI*2);
                                ctx.fill();
                                break;

                            case 'grid':
                                ctx.globalAlpha = 0.35;
                                const aw = Math.floor((val*120)/pSize)*pSize;
                                ctx.fillRect(px-aw/2, py, aw, Math.max(1, pSize/2));
                                break;

                            case 'scratch':
                                ctx.globalAlpha = 0.45;
                                const bh = Math.floor((val*100)/pSize)*pSize;
                                ctx.fillRect(px, py-bh/2, Math.max(1, pSize/2), bh);
                                break;

                            case 'flash':
                                ctx.globalAlpha = 0.8;
                                const fs = Math.max(2, pSize/3);
                                ctx.fillRect(px, py, fs, fs);
                                break;
                        }
                    }
                });

                ctx.globalAlpha=1;
            }
        }

        /* =========================
        3. Spectral Renderer
        ========================= */

        class SpectralRenderer {
            constructor(canvas, store){
                this.canvas = canvas;
                this.ctx = canvas.getContext("2d");
                this.store = store;
                this.history = [];
                this.maxHistory = 150;
                this.gain = 5;

                this.resize();
                window.addEventListener("resize", ()=>this.resize());
            }

            resize(){
                this.canvas.width = this.canvas.offsetWidth;
                this.canvas.height = this.canvas.offsetHeight;
            }

            setGain(g){
                this.gain = g;
            }

            clear() {
                this.history = [];
                this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
            }

            getHighContrastValue(rawVal){
                if(rawVal<=0) return 0;
                const val = Math.pow(rawVal*this.gain*1.5, 1.05)*4.5;
                return Math.min(val,this.canvas.height*0.85);
            }

            render(){
                this.history.push({...this.store.smoothed});
                if(this.history.length>this.maxHistory)
                    this.history.shift();

                const ctx=this.ctx;
                ctx.clearRect(0,0,this.canvas.width,this.canvas.height);

                const step=this.canvas.width/(this.maxHistory-1);
                const baseline=this.canvas.height-10;

                const colors={
                    Delta:'#4B0082', Theta:'#00CED1', Alpha:'#32CD32', Beta:'#FFD700', Gamma:'#FF4500'
                };

                Object.keys(colors).forEach(band=>{
                    ctx.beginPath();
                    ctx.strokeStyle=colors[band];
                    ctx.lineWidth=2;

                    this.history.forEach((p,i)=>{
                        const amp=this.getHighContrastValue(p[band]||0);
                        const x=i*step;
                        const y=baseline-amp;
                        if(i===0) ctx.moveTo(x,y);
                        else ctx.lineTo(x,y);
                    });
                    ctx.stroke();
                });
            }
        }

        /* =========================
        4. App Controller
        ========================= */

        const store = new BrainDataStore();
        const mainRenderer = new MainRenderer(document.getElementById("mainCanvas"), store);
        const spectralRenderer = new SpectralRenderer(document.getElementById("spectralCanvas"), store);

        const recordBtn = document.getElementById("recordBtn");
        const clearBtn = document.getElementById("clearBtn");
        const toggleUI = document.getElementById("toggleUI");
        const bottomDock = document.getElementById("bottomDock");
        
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;

        toggleUI.onclick = () => bottomDock.classList.toggle("hidden-panel");

        recordBtn.onclick = () => {
            if (!isRecording) startRecording();
            else stopRecording();
        };

        function startRecording() {
            recordedChunks = [];
            const stream = mainRenderer.canvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `BrainwaveMatrix_${Date.now()}.webm`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);
            };

            mediaRecorder.start();
            isRecording = true;
            recordBtn.innerText = "Stop & Download";
            recordBtn.classList.add("recording-glow");
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            recordBtn.innerText = "Start Recording";
            recordBtn.classList.remove("recording-glow");
        }

        clearBtn.onclick = () => {
            if(isRecording) stopRecording();
            store.reset();
            mainRenderer.clear();
            spectralRenderer.clear();
            document.getElementById("uploadStatus").innerText = "Import CSV";
            document.getElementById("csvFile").value = "";
        };

        document.getElementById("pixelSize").oninput = e=>{
            const val = parseInt(e.target.value);
            document.getElementById("pixelSizeDisp").innerText = val + "px";
            mainRenderer.setConfig({pixelSize: val});
        };

        document.getElementById("dataGain").oninput = e=>{
            const g=parseFloat(e.target.value);
            document.getElementById("gainDisp").innerText = g.toFixed(1);
            mainRenderer.setConfig({gain:g});
            spectralRenderer.setGain(g);
        };

        document.getElementById("playSpeed").oninput = e => {
            document.getElementById("speedDisp").innerText = e.target.value;
        }

        document.getElementById("csvFile").onchange = e=>{
            const file=e.target.files[0];
            if(!file) return;
            const reader=new FileReader();
            reader.onload=ev=>{
                const lines=ev.target.result.split("\n").filter(l => l.trim().length > 0);
                const headers=lines[0].split(",");
                const getIdx=name => headers.findIndex(h=>h.toLowerCase().includes(name.toLowerCase()));
                const idx={
                    Delta:getIdx("delta"), Theta:getIdx("theta"), Alpha:getIdx("alpha"), Beta:getIdx("beta"), Gamma:getIdx("gamma")
                };
                const parsed=lines.slice(1).map(l=>{
                    const c=l.split(",");
                    return {
                        Delta:parseFloat(c[idx.Delta])||0, Theta:parseFloat(c[idx.Theta])||0, Alpha:parseFloat(c[idx.Alpha])||0, Beta:parseFloat(c[idx.Beta])||0, Gamma:parseFloat(c[idx.Gamma])||0
                    };
                }).filter(d=> !isNaN(d.Delta));
                if (parsed.length > 0) {
                    store.load(parsed);
                    document.getElementById("uploadStatus").innerText = "Loaded " + parsed.length;
                }
            };
            reader.readAsText(file);
        };

        let last=0;
        function loop(t){
            // Control rendering frame rate
            if(t - last > 32){
                const speed = parseInt(document.getElementById("playSpeed").value || 100);
                const active = store.update(speed);
                if(active){
                    mainRenderer.render();
                    spectralRenderer.render();
                }
                last=t;
            }
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);

    </script>
</body>
</html>
